<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="FreshCart — Premium grocery shopping. Browse fresh produce, dairy, bakery items and more. Fast delivery to your door." />
  <title>FreshCart — Fresh Groceries, Delivered</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>
  <!-- NAVBAR -->
  <nav class="navbar" id="navbar">
    <div class="navbar-inner">
      <a href="#" class="logo" id="logo-link">
        <span class="logo-icon">🛒</span>
        <span class="logo-text">Fresh<span class="logo-accent">Cart</span></span>
      </a>
      <div class="search-bar" id="search-bar">
        <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" id="search-input" placeholder="Search groceries..." autocomplete="off" />
        <button class="search-clear hidden" id="search-clear">&times;</button>
      </div>
      <div class="navbar-actions">
        <div class="auth-buttons" id="auth-buttons">
          <!-- Auth buttons rendered by JS -->
        </div>
        <button class="nav-btn orders-btn" id="orders-btn" title="My Orders">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
          <span class="nav-btn-label">Orders</span>
        </button>
        <button class="nav-btn cart-btn" id="cart-btn" title="Cart">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 002 1.61h9.72a2 2 0 002-1.61L23 6H6"/></svg>
          <span class="cart-badge hidden" id="cart-badge">0</span>
        </button>
      </div>
    </div>
  </nav>

  <!-- CART SIDEBAR -->
  <div class="cart-overlay hidden" id="cart-overlay"></div>
  <aside class="cart-sidebar hidden" id="cart-sidebar">
    <div class="cart-header">
      <h2>Your Cart</h2>
      <button class="cart-close" id="cart-close">&times;</button>
    </div>
    <div class="cart-body" id="cart-body">
      <!-- Cart items rendered by JS -->
    </div>
    <div class="cart-footer" id="cart-footer">
      <!-- Summary + checkout rendered by JS -->
    </div>
  </aside>

  <!-- MAIN CONTENT -->
  <main class="main" id="main-content">
    <!-- Rendered by JS -->
  </main>

  <!-- TOAST CONTAINER -->
  <div class="toast-container" id="toast-container"></div>

  <script src="/js/api.js"></script>
  <script src="/js/utils.js"></script>
  <script src="/js/components/productCard.js"></script>
  <script src="/js/components/cartView.js"></script>
  <script src="/js/components/checkout.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
